---
- name: Validate Cloudflare Tunnel token
  ansible.builtin.assert:
    that:
      - cloudflared_tunnel_token | length > 0
    fail_msg: "Set CLOUDFLARED_TUNNEL_TOKEN to the token from the Cloudflare Tunnel setup screen."

- name: Create cloudflared directory
  ansible.builtin.file:
    path: "/home/{{ ansible_user }}/cloudflared"
    state: directory
    mode: "0755"

- name: Deploy docker-compose.yml
  ansible.builtin.copy:
    src: docker-compose.yml
    dest: "/home/{{ ansible_user }}/cloudflared/docker-compose.yml"
    mode: "0644"

- name: Deploy .env
  ansible.builtin.template:
    src: .env.j2
    dest: "/home/{{ ansible_user }}/cloudflared/.env"
    mode: "0600"
  no_log: true

- name: Create shared Immich public network
  community.docker.docker_network:
    name: "{{ immich_public_network }}"
    state: present

- name: Start cloudflared stack
  community.docker.docker_compose_v2:
    project_src: "/home/{{ ansible_user }}/cloudflared"
    state: present
