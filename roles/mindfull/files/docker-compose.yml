name: mindfull

services:
  mindfull:
    container_name: mindfull
    image: ghcr.io/vinayakakv/mind-full:${MINDFULL_VERSION:-latest}
    environment:
      MINDFULL_PAIRING_CODE: ${MINDFULL_PAIRING_CODE:?Set MINDFULL_PAIRING_CODE in .env}
    init: true
    ports:
      - "${MINDFULL_BIND_ADDRESS:-127.0.0.1}:${MINDFULL_PORT:-3001}:3001"
    restart: unless-stopped
    volumes:
      - mindfull-data:/data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/api/health').then(r => { if (!r.ok) process.exit(1) })",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  mindfull-data:
